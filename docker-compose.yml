services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "EcmsDocker@2026"
    ports:
      - "1433:1433"
    volumes:
      - ecms_sql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  ecms_sql_data:
